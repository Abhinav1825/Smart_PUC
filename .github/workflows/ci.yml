name: Smart PUC CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Solidity tests (Hardhat + in-process network + UUPS proxies) ────
  solidity-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install --no-audit --no-fund

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run Hardhat tests
        run: npx hardhat test

      - name: Run gas-reporter pass
        run: REPORT_GAS=true npx hardhat test
        continue-on-error: true

  # ── Static analysis (Slither) ───────────────────────────────────────
  solidity-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install --no-audit --no-fund

      - name: Compile contracts (needed by Slither)
        run: npx hardhat compile

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Slither
        run: pip install slither-analyzer

      - name: Run Slither static analysis
        run: slither contracts/ --exclude-dependencies --print human-summary || true

  # ── Python tests ────────────────────────────────────────────────────
  # NOTE: tests/test_blockchain_roundtrip.py is automatically skipped
  # here (no Hardhat node running). The dedicated blockchain-roundtrip
  # job below handles those tests with a live local node.
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=backend --cov=ml --cov=physics --cov=integrations \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ── Blockchain round-trip integration tests ─────────────────────────
  # Spins up a Hardhat node, deploys contracts, then runs the Python
  # ↔ Solidity round-trip tests that verify store/retrieve fidelity.
  blockchain-roundtrip:
    runs-on: ubuntu-latest
    needs: [python-tests, solidity-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install --no-audit --no-fund

      - name: Compile contracts
        run: npx hardhat compile

      - name: Start Hardhat node
        run: npx hardhat node &

      - name: Wait for Hardhat node
        run: sleep 5

      - name: Deploy contracts to local node
        run: npx hardhat run scripts/deploy.js --network localhost

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run blockchain round-trip tests
        env:
          RPC_URL: http://127.0.0.1:8545
          CHAIN_ID: "31337"
          EIP712_DOMAIN_NAME: SmartPUC
          EIP712_DOMAIN_VERSION: "3.2"
          JWT_SECRET: test-jwt-secret-please-do-not-use-in-prod
          API_KEY: test-api-key
          AUTH_USERNAME: admin
          AUTH_PASSWORD: admin
          PRIVACY_MODE: "0"
        run: python -m pytest tests/test_blockchain_roundtrip.py -v

  # ── Lint ────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install flake8

      - name: Flake8 lint
        run: |
          flake8 backend/ ml/ physics/ integrations/ \
            --max-line-length=120 \
            --max-complexity=15 \
            --ignore=E501,W503,E402

  # ── Docker build verification ───────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build all Docker images
        run: docker compose build
