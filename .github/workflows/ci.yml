name: Smart PUC CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Solidity Tests ──────────────────────────────────────────────────
  solidity-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm install

      - name: Compile contracts
        run: npx truffle compile

      - name: Start Ganache
        run: npx ganache --deterministic --accounts 10 --gasLimit 12000000 &

      - name: Wait for Ganache
        run: sleep 5

      - name: Run Truffle tests
        run: npx truffle test

      - name: Generate test gas report
        run: |
          echo "=== Gas Report ==="
          npx truffle test 2>&1 | grep -iE "(gas|cost|deploy)" || echo "No gas data captured (add eth-gas-reporter to devDependencies for detailed reports)"

  # ── Solidity Security (Slither) ─────────────────────────────────────
  solidity-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm install

      - name: Compile contracts (needed by Slither)
        run: npx truffle compile

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Slither
        run: pip install slither-analyzer

      - name: Run Slither static analysis
        run: slither . --print human-summary || true

  # ── Python Tests ────────────────────────────────────────────────────
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=backend --cov=ml --cov=physics --cov=integrations \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ── Lint ────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install flake8

      - name: Flake8 lint
        run: |
          flake8 backend/ ml/ physics/ integrations/ \
            --max-line-length=120 \
            --max-complexity=15 \
            --ignore=E501,W503,E402

  # ── Docker Build Verification ───────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build all Docker images
        run: docker compose build
